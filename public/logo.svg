<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer hexagon -->
  <polygon points="256,32 448,128 448,320 256,416 64,320 64,128" stroke="url(#g1)" stroke-width="6" fill="none" opacity="0.4"/>
  <!-- Inner hexagon -->
  <polygon points="256,80 400,152 400,296 256,368 112,296 112,152" stroke="url(#g1)" stroke-width="4" fill="none" opacity="0.25"/>
  <!-- Central hub circle -->
  <circle cx="256" cy="224" r="64" stroke="url(#g2)" stroke-width="5" fill="none" filter="url(#glow)"/>
  <circle cx="256" cy="224" r="24" fill="url(#g2)" opacity="0.9"/>
  <!-- Circuit lines radiating from center -->
  <!-- Top -->
  <line x1="256" y1="160" x2="256" y2="96" stroke="#06b6d4" stroke-width="3" opacity="0.7"/>
  <circle cx="256" cy="92" r="5" fill="#06b6d4" opacity="0.9"/>
  <!-- Top-right -->
  <line x1="311" y1="192" x2="368" y2="148" stroke="#8b5cf6" stroke-width="3" opacity="0.7"/>
  <circle cx="372" cy="145" r="5" fill="#8b5cf6" opacity="0.9"/>
  <!-- Top-left -->
  <line x1="201" y1="192" x2="144" y2="148" stroke="#8b5cf6" stroke-width="3" opacity="0.7"/>
  <circle cx="140" cy="145" r="5" fill="#8b5cf6" opacity="0.9"/>
  <!-- Bottom-right -->
  <line x1="311" y1="256" x2="368" y2="300" stroke="#06b6d4" stroke-width="3" opacity="0.7"/>
  <circle cx="372" cy="304" r="5" fill="#06b6d4" opacity="0.9"/>
  <!-- Bottom-left -->
  <line x1="201" y1="256" x2="144" y2="300" stroke="#06b6d4" stroke-width="3" opacity="0.7"/>
  <circle cx="140" cy="304" r="5" fill="#06b6d4" opacity="0.9"/>
  <!-- Bottom -->
  <line x1="256" y1="288" x2="256" y2="352" stroke="#8b5cf6" stroke-width="3" opacity="0.7"/>
  <circle cx="256" cy="356" r="5" fill="#8b5cf6" opacity="0.9"/>
  <!-- "ACH" text -->
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-weight="700" font-size="48" fill="url(#g1)" letter-spacing="12">ACH</text>
</svg>
